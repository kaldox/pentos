name: Bug Report
description: Etwas funktioniert nicht wie erwartet.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Was passiert?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Schritte zum Reproduzieren
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Umgebung (OS, Python, Version)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Fehlermeldungen
      render: shell
